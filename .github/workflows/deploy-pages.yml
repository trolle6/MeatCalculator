name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "GITHUB-PAGES.md"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build
        run: dotnet build "meat calculator/meat calculator.csproj" -c Release

      - name: Lint client script
        run: node --check "meat calculator/wwwroot/app.js"

      - name: Export static site + API JSON
        run: |
          set -e
          dotnet run --project "meat calculator/meat calculator.csproj" -c Release --no-build \
            --urls "http://127.0.0.1:5050" &
          PID=$!
          for i in $(seq 1 60); do
            if curl -sf "http://127.0.0.1:5050/api/data" >/dev/null; then break; fi
            sleep 1
          done
          curl -sf "http://127.0.0.1:5050/api/data" || { echo "API did not start"; kill $PID 2>/dev/null; exit 1; }

          mkdir -p _site/api/rest
          touch _site/.nojekyll
          rsync -a --exclude 'ux-lab/' --exclude 'pull-slip/' "meat calculator/wwwroot/" _site/

          curl -sf "http://127.0.0.1:5050/api/data" -o _site/api/data.json
          curl -sf "http://127.0.0.1:5050/api/timeline" -o _site/api/timeline.json
          curl -sf "http://127.0.0.1:5050/api/science" -o _site/api/science.json
          curl -sf "http://127.0.0.1:5050/api/recipes" -o _site/api/recipes.json
          curl -sf "http://127.0.0.1:5050/api/guide" -o _site/api/guide.json
          curl -sf "http://127.0.0.1:5050/api/profiles" -o _site/api/profiles.json
          curl -sf "http://127.0.0.1:5050/api/sources" -o _site/api/sources.json
          curl -sf "http://127.0.0.1:5050/api/rest/environments" -o _site/api/rest/environments.json

          kill $PID 2>/dev/null || true
          wait $PID 2>/dev/null || true

      - name: Verify public planner bundle
        run: |
          grep -q 'pullTempBadge' _site/index.html
          grep -q 'brand-home' _site/index.html
          grep -q 'smoke-lab-build' _site/index.html
          grep -q 'getPullTempGuide' _site/app.js
          BUILD="$(node -e "const h=require('fs').readFileSync('_site/index.html','utf8'); const m=h.match(/smoke-lab-build\\\" content=\\\"(\\d+)\\\"/); if(!m)process.exit(1); process.stdout.write(m[1]);")"
          grep -q "app.css?v=${BUILD}" _site/index.html
          echo "BUILD=${BUILD}" >> "$GITHUB_ENV"

      # Site is published via actions/deploy-pages only (GitHub Actions source).
      # Do not also push gh-pages — that triggers a second Pages deployment that fails.

      - name: Sync docs folder on main
        run: |
          git fetch origin main
          git checkout main
          rm -rf docs
          cp -r _site docs
          touch docs/.nojekyll
          git add docs
          git diff --staged --quiet && exit 0
          git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
            commit -m "docs: deploy build ${{ env.BUILD }} [skip ci]"
          git push origin main

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (Actions source)
        id: deploy
        uses: actions/deploy-pages@v4
